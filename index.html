<script>

let images = []; // {id, name, file, originalUrl, originalW, originalH, processedCanvas, processedBlob, processedName}
let idCounter = 0;
let currentOperation = null; // 'resize', 'compress', 'watermark', 'format'
let lastProcessedBlobs = []; // for download

const chatMessages = document.getElementById('chatMessages');
const chatArea = document.getElementById('chatArea');

// ============ Init ============
function init() {
  setupDropZone();
  addBotMessage(`你好！我是批量图片编辑助手 🖼️\n\n上传多张图片，然后选择要做的操作：压缩、加水印、调尺寸、转格式。所有处理在浏览器本地完成，隐私安全。`);
}

// ============ Chat Helpers ============
function scrollToBottom() {
  requestAnimationFrame(() => { chatArea.scrollTop = chatArea.scrollHeight; });
}

function addUserMessage(html) {
  const div = document.createElement('div');
  div.className = 'flex justify-end fade-in';
  div.innerHTML = `<div class="max-w-[80%] bg-purple-600 text-white rounded-2xl rounded-br-md px-4 py-2.5 text-sm shadow-sm border border-purple-400/30">${html}</div>`;
  chatMessages.appendChild(div);
  scrollToBottom();
}

function addBotMessage(text) {
  const div = document.createElement('div');
  div.className = 'flex justify-start fade-in';
  const formattedText = text.replace(/\n/g, '<br>');
  div.innerHTML = `
    <div class="flex gap-2 max-w-[85%]">
      <div class="w-7 h-7 gradient-bg rounded-full flex items-center justify-center flex-shrink-0 mt-0.5 shadow">

      </div>
      <div class="bg-white rounded-2xl rounded-bl-md px-4 py-2.5 text-sm text-gray-700 shadow-sm border border-gray-200">${formattedText}</div>
    </div>`;
  chatMessages.appendChild(div);
  scrollToBottom();
}

function addBotHTML(html) {
  const div = document.createElement('div');
  div.className = 'flex justify-start fade-in';
  div.innerHTML = `
    <div class="flex gap-2 max-w-[90%]">
      <div class="w-7 h-7 gradient-bg rounded-full flex items-center justify-center flex-shrink-0 mt-0.5 shadow">
        <svg width="14" height="14" class="w-3.5 h-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01"/></svg>
      </div>
      <div class="bg-white rounded-2xl rounded-bl-md px-4 py-3 text-sm text-gray-700 shadow-sm border border-gray-200">${html}</div>
    </div>`;
  chatMessages.appendChild(div);
  scrollToBottom();
  return div;
}

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'flex justify-start fade-in';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="flex gap-2">
      <div class="w-7 h-7 gradient-bg rounded-full flex items-center justify-center flex-shrink-0 mt-0.5 shadow">

      </div>

  chatMessages.appendChild(div);
  scrollToBottom();
}

function removeTypingIndicator() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// ============ Drop Zone ============
function setupDropZone() {
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', e => {
    handleFiles(e.target.files);
    fileInput.value = '';
  });
}

// ============ File Handling ============
function handleFiles(files) {
  const imageFiles = [...files].filter(f => f.type.startsWith('image/'));
  if (!imageFiles.length) return;

  let loaded = 0;
  const newImages = [];
  imageFiles.forEach(file => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      newImages.push({
        id: ++idCounter,
        name: file.name,
        file,
        originalUrl: url,
        originalW: img.naturalWidth,
        originalH: img.naturalHeight,
        processedCanvas: null,
        processedBlob: null,
        processedName: file.name
      });
      loaded++;
      if (loaded === imageFiles.length) {
        images = newImages;
        onImagesLoaded(imageFiles.length);
      }
    };
    img.src = url;
  });
}

function onImagesLoaded(count) {
  // User message with thumbnail grid
  let thumbHtml = `<div class="grid grid-cols-4 gap-1 mb-1">`;
  images.slice(0, 8).forEach(item => {
    thumbHtml += `<img src="${item.originalUrl}" class="w-14 h-14 object-cover rounded-lg">`;
  });
  if (count > 8) thumbHtml += `<div class="w-14 h-14 bg-white/20 rounded-lg flex items-center justify-center text-xs font-bold">+${count-8}</div>`;
  thumbHtml += `</div>`;
  const totalSize = images.reduce((s, i) => s + i.file.size, 0);
  addUserMessage(`${thumbHtml}<div class="text-xs opacity-80 mt-1">共 ${count} 张 · 总计 ${formatSize(totalSize)}</div>`);

  // Show operation options
  setTimeout(() => {
    showOperationOptions();
  }, 300);
}

          <span class="text-xl">📐</span>
          <div>
            <div class="text-sm font-semibold text-gray-800">批量调尺寸</div>
            <div class="text-[10px] text-gray-400">调整图片宽高</div>

        </button>
        <button onclick="selectOperation('format')" class="op-btn flex items-center gap-2 px-4 py-3 rounded-xl border-2 border-gray-100 bg-white hover:border-purple-300 hover:bg-purple-50 text-left">
          <span class="text-xl">🔄</span>

            <div class="text-[10px] text-gray-400">JPG / PNG / WebP</div>
          </div>
        </button>
      </div>`;
    addBotHTML(html);
  }, 400);
}

function selectOperation(op) {
  currentOperation = op;

// ============ Processing ============
function showProcessing(text, progress) {
  document.getElementById('processingOverlay').classList.remove('hidden');
  if (text) document.getElementById('processingText').textContent = text;
  if (progress !== undefined) document.getElementById('processingProgress').textContent = progress;
}
function hideProcessing() { document.getElementById('processingOverlay').classList.add('hidden'); }

function loadImageEl(item) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = item.originalUrl;
  });
}
function canvasToBlob(canvas, type, quality) {
  return new Promise(resolve => canvas.toBlob(resolve, type, quality));
}
function getExtension(mime) {
  const map = { 'image/jpeg': '.jpg', 'image/png': '.png', 'image/webp': '.webp' };
  return map[mime] || '.png';
}

// ---- Compress ----
async function executeCompress() {
  showProcessing('正在压缩...');
  const quality = parseInt(document.getElementById('cfgCompressQuality').value) / 100;
  lastProcessedBlobs = [];
  for (let i = 0; i < images.length; i++) {
    document.getElementById('processingProgress').textContent = `${i+1} / ${images.length}`;
    const item = images[i];
    const img = await loadImageEl(item);
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    canvas.getContext('2d').drawImage(img, 0, 0);
    item.processedCanvas = canvas;
    item.processedBlob = await canvasToBlob(canvas, 'image/jpeg', quality);
    item.processedName = item.name.replace(/\.[^.]+$/, '') + '_compressed.jpg';
    lastProcessedBlobs.push({ name: item.processedName, blob: item.processedBlob });
  }
  hideProcessing();
  showResultMessage('压缩');
}

// ---- Watermark ----
async function executeWatermark() {
  showProcessing('正在添加水印...');
  const text = document.getElementById('cfgWmText').value || 'Watermark';
  const fontSize = parseInt(document.getElementById('cfgWmSize').value) || 24;
  const color = document.getElementById('cfgWmColor').value;
  const opacity = parseInt(document.getElementById('cfgWmOpacity').value) / 100;
  const position = document.getElementById('cfgWmPosition').value;
  lastProcessedBlobs = [];
  for (let i = 0; i < images.length; i++) {
    document.getElementById('processingProgress').textContent = `${i+1} / ${images.length}`;
    const item = images[i];
    const img = await loadImageEl(item);
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.font = `bold ${fontSize}px sans-serif`;
    ctx.fillStyle = color;
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetX = 1;
    ctx.shadowOffsetY = 1;
    const tw = ctx.measureText(text).width;
    const th = fontSize;
    const pad = 20;
    let x, y;
    const [vPos, hPos] = position.split('-');
    if (vPos === 'top') y = pad + th;
    else if (vPos === 'center') y = canvas.height / 2 + th / 2;
    else y = canvas.height - pad;
    if (hPos === 'left') x = pad;
    else if (hPos === 'center') x = (canvas.width - tw) / 2;
    else x = canvas.width - tw - pad;
    ctx.fillText(text, x, y);
    ctx.restore();
    const ext = getExtension(item.file.type);
    const mime = item.file.type || 'image/png';
    item.processedCanvas = canvas;
    item.processedBlob = await canvasToBlob(canvas, mime, 0.92);
    item.processedName = item.name.replace(/\.[^.]+$/, '') + '_watermarked' + ext;
    lastProcessedBlobs.push({ name: item.processedName, blob: item.processedBlob });
  }
  hideProcessing();
  showResultMessage('水印');
}

// ---- Resize ----
async function executeResize() {
  showProcessing('正在调整尺寸...');
  const mode = document.getElementById('cfgResizeMode').value;
  const keepRatio = document.getElementById('cfgKeepRatio').checked;
  lastProcessedBlobs = [];
  for (let i = 0; i < images.length; i++) {
    document.getElementById('processingProgress').textContent = `${i+1} / ${images.length}`;
    const item = images[i];
    const img = await loadImageEl(item);
    const canvas = document.createElement('canvas');
    let w, h;
    if (mode === 'pixel') {
      w = parseInt(document.getElementById('cfgResizeW').value) || img.naturalWidth;
      h = parseInt(document.getElementById('cfgResizeH').value) || img.naturalHeight;
      if (keepRatio) {
        const ratio = img.naturalWidth / img.naturalHeight;
        if (document.getElementById('cfgResizeW').value && !document.getElementById('cfgResizeH').value) {
          h = Math.round(w / ratio);
        } else if (document.getElementById('cfgResizeH').value && !document.getElementById('cfgResizeW').value) {
          w = Math.round(h * ratio);
        } else {
          h = Math.round(w / ratio);
        }
      }
    } else {
      const pct = (parseInt(document.getElementById('cfgResizePercent').value) || 100) / 100;
      w = Math.round(img.naturalWidth * pct);
      h = Math.round(img.naturalHeight * pct);
    }
    canvas.width = w;
    canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    const ext = getExtension(item.file.type);
    const mime = item.file.type || 'image/png';
    item.processedCanvas = canvas;
    item.processedBlob = await canvasToBlob(canvas, mime, 0.92);
    item.processedName = item.name.replace(/\.[^.]+$/, '') + '_resized' + ext;
    lastProcessedBlobs.push({ name: item.processedName, blob: item.processedBlob });
  }
  hideProcessing();
  showResultMessage('调尺寸');
}

// ---- Format ----
async function executeFormat() {
  showProcessing('正在转换格式...');
  const format = document.getElementById('cfgFormat').value;
  const quality = parseInt(document.getElementById('cfgFormatQuality').value) / 100;
  const ext = getExtension(format);
  lastProcessedBlobs = [];
  for (let i = 0; i < images.length; i++) {
    document.getElementById('processingProgress').textContent = `${i+1} / ${images.length}`;
    const item = images[i];
    const img = await loadImageEl(item);
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    canvas.getContext('2d').drawImage(img, 0, 0);
    item.processedCanvas = canvas;
    item.processedBlob = await canvasToBlob(canvas, format, quality);
    item.processedName = item.name.replace(/\.[^.]+$/, '') + '_converted' + ext;
    lastProcessedBlobs.push({ name: item.processedName, blob: item.processedBlob });
  }
  hideProcessing();
  showResultMessage('转格式');
}

// ============ Result Display ============
function showResultMessage(opName) {
  addTypingIndicator();
  setTimeout(() => {
    removeTypingIndicator();
    const processed = images.filter(i => i.processedBlob);
    const totalSize = processed.reduce((s, i) => s + (i.processedBlob ? i.processedBlob.size : 0), 0);

    let html = `<div class="text-gray-500 mb-2">处理完成！✅ 共 ${processed.length} 张 · 总计 ${formatSize(totalSize)}</div>`;

    // Thumbnail grid (max 8)
    if (processed.length > 0) {
      html += `<div class="grid grid-cols-4 gap-1.5 mb-3">`;
      processed.slice(0, 8).forEach(item => {
        const url = URL.createObjectURL(item.processedBlob);
        html += `<div class="result-card bg-gray-50 rounded-lg overflow-hidden border border-gray-100">
          <div class="aspect-square flex items-center justify-center p-1">
            <img src="${url}" class="max-w-full max-h-full object-contain rounded" alt="result">
          </div>
        </div>`;
      });
      if (processed.length > 8) {
        html += `<div class="aspect-square bg-purple-50 rounded-lg flex items-center justify-center text-xs font-bold text-purple-600 border border-purple-100">+${processed.length - 8}</div>`;
      }
      html += `</div>`;
    }

    // Info list
    html += `<div class="bg-gray-50 rounded-xl p-3 mb-3 max-h-32 overflow-y-auto">`;
    processed.forEach(item => {
      const info = item.processedCanvas ? `${item.processedCanvas.width}×${item.processedCanvas.height}` : '';
      html += `<div class="flex items-center justify-between py-1 border-b border-gray-100 last:border-0">
        <span class="text-[10px] text-gray-500 truncate max-w-[50%]">${item.name}</span>
        <span class="text-[10px] text-gray-400">${info} · ${formatSize(item.processedBlob.size)}</span>
      </div>`;
    });
    html += `</div>`;

    // Download ZIP button
    html += `<button onclick="downloadZip()" class="w-full gradient-bg text-white px-4 py-2.5 rounded-xl text-sm font-semibold hover:opacity-90 transition shadow-md flex items-center justify-center gap-2">
      <svg width="16" height="16" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
      打包下载 ZIP
    </button>`;
    html += `<p class="text-xs text-gray-400 mt-3">💡 可以继续上传新图片</p>`;
    addBotHTML(html);
  }, 400);
}

// ============ Download ============
async function downloadZip() {
  const processed = images.filter(i => i.processedBlob);
  if (!processed.length) return;
  showProcessing('正在打包 ZIP...');
  const zip = new JSZip();
  processed.forEach(item => zip.file(item.processedName, item.processedBlob));
  const content = await zip.generateAsync({ type: 'blob' }, meta => {
    document.getElementById('processingProgress').textContent = `打包中 ${Math.round(meta.percent)}%`;
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(content);
  a.download = `batch-images-${Date.now()}.zip`;
  a.click();
  URL.revokeObjectURL(a.href);
  hideProcessing();
}

// ============ Utilities ============
function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

// ============ Start ============
init();

    if (installBtn) installBtn.style.display = 'flex';

  if (installBtn) {
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        installBtn.style.display = 'none';
      }
      deferredPrompt = null;
    });
  }
  if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
    if (installBtn) installBtn.style.display = 'none';
  }
})();

<script>
(function(){

  function check(){
    fetch('https://api.github.com/repos/hpennn/'+REPO+'/releases/latest')
    .then(function(r){return r.json()})
    .then(function(d){
      var lv=(d.tag_name||'').replace(/^v/,'');
      if(cmpVer(lv,VER)>0)showDlg(lv,d);
    }).catch(function(){});
  }
  function cmpVer(a,b){
    var pa=a.split('.').map(Number),pb=b.split('.').map(Number);
    for(var i=0;i<Math.max(pa.length,pb.length);i++){
      if((pa[i]||0)>(pb[i]||0))return 1;
      if((pa[i]||0)<(pb[i]||0))return -1;
    }return 0;
  }
  function showDlg(ver,data){

})();
